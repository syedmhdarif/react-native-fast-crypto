buildscript {
  ext.FastCrypto = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 23,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return FastCrypto[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.fastcrypto"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")

    ndk {
      abiFilters "arm64-v8a", "x86_64"
    }

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++17 -fstack-protector-strong"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
      version "3.22.1"
    }
  }

  buildFeatures {
    buildConfig true
  }

  // Exclude the prebuilt shared OpenSSL libs from the AAR/APK.
  // We statically link OpenSSL into libfast_crypto.so, so the shared
  // libcrypto.so is not needed at runtime. The prebuilt .so lacks 16KB
  // page alignment and a valid DT_GNU_HASH, crashing on Android 15.
  packaging {
    jniLibs {
      excludes += ['**/libcrypto.so', '**/libssl.so']
    }
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "androidx.biometric:biometric:1.2.0-alpha05"
  // OpenSSL is vendored as a static library in android/libs/
  // Built by scripts/build-openssl-android.sh
}
